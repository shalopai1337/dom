<!doctype html>
<html>
	<head>
		<title>  ToLower </title>
	</head>

	<body>
		<script>
			let ucFirst = function(str) {
				return str[0].toUpperCase() + str.slice(1);
			}
			let str = prompt('Введите имя');
			let result = ucFirst(str);
			alert(result);
		</script>
	</body>
</html>
